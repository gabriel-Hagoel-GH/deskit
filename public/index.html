<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת ניהול עמדה חמה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Assistant', 'Heebo', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Assistant', sans-serif; }
    .fade-in { animation: fadeIn .25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 hidden fade-in"></div>

  <header class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-bold">🖥️</div>
        <h1 class="text-xl font-800 font-extrabold text-slate-900">מערכת ניהול עמדה חמה</h1>
      </div>
      <div id="userBox" class="flex items-center gap-2"></div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <div id="loginCard" class="hidden"></div>
    <div id="app" class="hidden space-y-6"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
